<svg xmlns="http://www.w3.org/2000/svg" fill="none" version="1.1" width="200" height="200" viewBox="0 0 200 200">
  <!-- AI Arb Favicon/Avatar: Abstract "A" with circuit nodes -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B3FE3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#bgGrad)"/>
  <!-- "A" letterform -->
  <path d="M100 40 L140 155 L124 155 L114 120 L86 120 L76 155 L60 155 Z" fill="#FFFFFF"/>
  <rect x="88" y="120" width="24" height="8" rx="2" fill="rgba(75,63,227,0.4)"/>
  <!-- Circuit nodes -->
  <circle cx="100" cy="40" r="6" fill="#FFFFFF"/>
  <circle cx="60" cy="155" r="6" fill="#FFFFFF"/>
  <circle cx="140" cy="155" r="6" fill="#FFFFFF"/>
  <!-- Small decorative dots -->
  <circle cx="45" cy="60" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="155" cy="60" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="45" cy="140" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="155" cy="140" r="3" fill="rgba(255,255,255,0.4)"/>
  <!-- Connection lines -->
  <line x1="100" y1="46" x2="100" y2="60" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="66" y1="150" x2="76" y2="135" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="134" y1="150" x2="124" y2="135" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-dasharray="3,3"/>
</svg>
