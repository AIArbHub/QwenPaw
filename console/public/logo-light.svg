<svg xmlns="http://www.w3.org/2000/svg" fill="none" version="1.1" width="600" height="132" viewBox="0 0 600 132">
  <!-- AI Arb Icon: Abstract "A" shape with circuit/node motif -->
  <g transform="translate(8, 10)">
    <!-- Outer circle -->
    <circle cx="56" cy="56" r="52" fill="none" stroke="#1a1a2e" stroke-width="4"/>
    <!-- Inner "A" letterform -->
    <path d="M56 18 L88 94 L76 94 L68 72 L44 72 L36 94 L24 94 Z" fill="#1a1a2e"/>
    <rect x="48" y="72" width="16" height="6" rx="1" fill="rgba(255,255,255,0.3)"/>
    <!-- Circuit nodes -->
    <circle cx="56" cy="18" r="4" fill="#1a1a2e"/>
    <circle cx="24" cy="94" r="4" fill="#1a1a2e"/>
    <circle cx="88" cy="94" r="4" fill="#1a1a2e"/>
    <!-- Connection lines -->
    <line x1="56" y1="22" x2="56" y2="30" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="28" y1="90" x2="36" y2="82" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="84" y1="90" x2="76" y2="82" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="2,2"/>
  </g>
  <!-- "AI" text -->
  <text x="130" y="58" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="800" fill="#1a1a2e" letter-spacing="-1">AI</text>
  <!-- "Arb" text -->
  <text x="178" y="58" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="300" fill="#1a1a2e" letter-spacing="-1">Arb</text>
  <!-- Tagline -->
  <text x="130" y="82" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="400" fill="rgba(26,26,46,0.5)" letter-spacing="2">INTELLIGENT AGENT PLATFORM</text>
</svg>
