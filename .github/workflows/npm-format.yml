name: NPM Format (website & console)

on: [push, pull_request]

jobs:
  spam-gate:
    name: PR Spam Gate
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/pr-spam-gate.yml
    with:
      author: ${{ github.event.pull_request.user.login }}

  website:
    name: website format check
    needs: [spam-gate]
    if: |
      always() &&
      (needs.spam-gate.result == 'skipped' || needs.spam-gate.outputs.blocked != 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Auto-format with Prettier
        run: npx prettier --write .

      - name: Check for uncommitted formatting changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Formatting issues detected. Run 'pnpm run format' locally and commit the changes."
            exit 1
          fi

      - name: Run TypeScript check
        run: npx tsc -b --noEmit

  console:
    name: console format check
    needs: [spam-gate]
    if: |
      always() &&
      (needs.spam-gate.result == 'skipped' || needs.spam-gate.outputs.blocked != 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run format check
        run: npm run format:check